<script>
  document.addEventListener("DOMContentLoaded", function () {
    var scriptSources = [
      "https://cdn.bootcdn.net/ajax/libs/mermaid/10.9.1/mermaid.min.js",
      "https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js",
      "https://unpkg.com/mermaid@10/dist/mermaid.min.js"
    ];

    function convertBlocks() {
      var blocks = document.querySelectorAll("pre code.language-mermaid, pre code.mermaid");
      blocks.forEach(function (code) {
        var pre = code.parentElement;
        if (!pre) {
          return;
        }

        var container = document.createElement("div");
        container.className = "mermaid";
        container.textContent = code.textContent || "";
        pre.replaceWith(container);
      });
    }

    function initMermaid() {
      if (!window.mermaid) {
        return;
      }
      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: "loose"
      });
      window.mermaid.run({ querySelector: ".mermaid" });
    }

    function loadFrom(index) {
      if (index >= scriptSources.length) {
        return;
      }

      var s = document.createElement("script");
      s.src = scriptSources[index];
      s.onload = initMermaid;
      s.onerror = function () {
        loadFrom(index + 1);
      };
      document.head.appendChild(s);
    }

    convertBlocks();
    if (window.mermaid) {
      initMermaid();
      return;
    }
    loadFrom(0);
  });
</script>
